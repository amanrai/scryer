<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PM Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .5px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .section-header { font-size: .75rem; font-weight: 600; text-transform: uppercase;
                      letter-spacing: .08em; color: #6c757d; margin-bottom: .75rem; }
    .comment-block { border-left: 3px solid #dee2e6; padding-left: 1rem; margin-bottom: .75rem; }
    .comment-block:hover { border-left-color: #0d6efd; }
    .edit-form { display: none; margin-top: .5rem; }
    .editing .edit-form { display: block; }
    .editing .comment-text { display: none; }
    .bg-orange { background-color: #fd7e14 !important; color: #fff; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">⬡ PM Admin</a>
    <a href="/logs" class="nav-link text-white-50 small">Logs</a>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Inline comment editing toggle
  document.querySelectorAll('.edit-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.comment-block').classList.toggle('editing');
    });
  });
</script>
</body>
</html>
