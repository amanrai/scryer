<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restarting…</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="text-center">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5>Restarting on <code>{{ host }}:{{ port }}</code>…</h5>
    <p class="text-muted small">Redirecting once the server is back up.</p>
  </div>
  <script>
    const target = "http://{{ host if host != '0.0.0.0' else 'localhost' }}:{{ port }}/";
    function tryConnect() {
      fetch(target, { mode: "no-cors" })
        .then(() => { window.location = target; })
        .catch(() => { setTimeout(tryConnect, 800); });
    }
    setTimeout(tryConnect, 1200);
  </script>
</body>
</html>
