<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restarting…</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background: #111; }</style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="text-center text-white">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5>Restarting user server on <code>{{ host }}:{{ port }}</code>…</h5>
    <p class="text-white-50 small">Will redirect once it's back up.</p>
  </div>
  <script>
    const display = "{{ host }}" === "0.0.0.0" ? "localhost" : "{{ host }}";
    const target  = `http://${display}:{{ port }}/`;
    function tryConnect() {
      fetch(target, { mode: "no-cors" })
        .then(() => { window.location = target; })
        .catch(() => { setTimeout(tryConnect, 800); });
    }
    setTimeout(tryConnect, 1200);
  </script>
</body>
</html>
